<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyFlip - Bazaar Flipper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; font-size: 14px; }

    header {
      background: #111;
      padding: 12px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    header h1 { font-size: 20px; color: #4fc3f7; }

    .controls {
      background: #222;
      padding: 10px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .controls label { color: #aaa; font-size: 13px; }
    .controls input, .controls select {
      background: #333; border: 1px solid #444; color: #fff;
      padding: 5px 10px; border-radius: 4px; font-size: 13px; width: 110px;
    }
    .controls button {
      background: #4fc3f7; color: #111; border: none;
      padding: 6px 16px; border-radius: 4px; cursor: pointer;
      font-weight: bold; font-size: 13px;
    }
    .controls button:hover { background: #81d4fa; }
    .controls button:disabled { background: #444; color: #777; cursor: not-allowed; }

    .btn-cart-open {
      background: #333 !important; color: #e0e0e0 !important;
      border: 1px solid #555 !important; position: relative;
    }
    .btn-cart-open:hover { background: #444 !important; }
    .cart-badge {
      position: absolute; top: -6px; right: -6px;
      background: #ef5350; color: #fff; font-size: 10px; font-weight: bold;
      border-radius: 999px; padding: 1px 5px; min-width: 16px;
      text-align: center; display: none;
    }

    .status-bar {
      padding: 5px 20px; background: #1e1e1e; font-size: 12px;
      color: #666; border-bottom: 1px solid #2a2a2a;
      display: flex; gap: 24px; align-items: center;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #66bb6a; display: inline-block;
      animation: pulse 1.5s infinite;
      margin-right: 4px;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    #error-box {
      background: #2d1010; border: 1px solid #7f1d1d; color: #fca5a5;
      padding: 10px 20px; margin: 12px 20px 0; border-radius: 4px; display: none;
    }
    #loading { text-align: center; padding: 60px; color: #555; }

    /* CARDS */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px; padding: 16px 20px;
    }

    .card {
      background: #252525; border: 1px solid #333; border-radius: 8px;
      padding: 14px 14px 12px; display: flex; flex-direction: column;
      align-items: center; gap: 5px; position: relative; transition: border-color 0.15s;
    }
    .card:hover { border-color: #555; }
    .card.in-cart { border-color: #4fc3f7; }

    .card-add-btn {
      position: absolute; top: 8px; right: 8px;
      width: 24px; height: 24px; border-radius: 50%;
      background: #333; border: 1px solid #555; color: #aaa;
      font-size: 18px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .card-add-btn:hover { background: #4fc3f7; color: #111; border-color: #4fc3f7; }
    .card.in-cart .card-add-btn { background: #4fc3f7; color: #111; border-color: #4fc3f7; }

    .card-img { width: 52px; height: 52px; image-rendering: pixelated; object-fit: contain; }
    .card-img-placeholder {
      width: 52px; height: 52px; background: #333; border-radius: 6px;
      display: none; align-items: center; justify-content: center; font-size: 20px;
    }
    .card-name { font-weight: 700; font-size: 13px; color: #fff; text-align: center; line-height: 1.3; }

    .card-divider { width: 100%; height: 1px; background: #333; margin: 3px 0; }

    .card-row {
      width: 100%; display: flex; justify-content: space-between;
      font-size: 12px; color: #aaa;
    }
    .card-row span:last-child { color: #e0e0e0; font-weight: 500; }

    /* Risk badge */
    .risk-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;
      margin-top: 2px;
    }
    .risk-low  { background: #1b4332; color: #6ee7b7; }
    .risk-med  { background: #451a03; color: #fbbf24; }
    .risk-high { background: #450a0a; color: #fca5a5; }

    /* Volume mini bars */
    .vol-bars { width: 100%; display: flex; flex-direction: column; gap: 3px; margin: 2px 0; }
    .vol-bar-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #aaa; }
    .vol-bar-track { flex: 1; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
    .vol-bar-fill  { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .vol-bar-val   { width: 38px; text-align: right; color: #888; font-size: 11px; }

    /* Profit breakdown */
    .profit-row {
      width: 100%; display: flex; justify-content: space-between;
      font-size: 12px; margin-top: 2px;
    }
    .card-profit { font-size: 13px; font-weight: 700; margin-top: 4px; }

    .pos  { color: #66bb6a; }
    .neg  { color: #ef5350; }
    .warn { color: #ffa726; }
    .neu  { color: #888; }

    #empty-msg { text-align: center; padding: 50px; color: #444; }

    /* ===== CART PANEL ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 100;
      align-items: flex-start; justify-content: flex-end;
    }
    .modal-overlay.open { display: flex; }

    .cart-panel {
      background: #1e1e1e; border-left: 1px solid #333;
      width: 440px; max-width: 100vw; height: 100vh;
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .cart-header {
      padding: 16px 20px; border-bottom: 1px solid #333;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: #1e1e1e; z-index: 1;
    }
    .cart-header h2 { font-size: 16px; color: #fff; }
    .cart-close { background: none; border: none; color: #aaa; font-size: 22px; cursor: pointer; }
    .cart-close:hover { color: #fff; }

    .cart-body { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 14px; }
    .cart-empty { color: #555; text-align: center; padding: 40px 0; line-height: 1.8; }

    .cart-item {
      background: #252525; border: 1px solid #333; border-radius: 8px;
      padding: 12px; display: flex; flex-direction: column; gap: 10px;
    }
    .cart-item-header { display: flex; align-items: center; gap: 10px; }
    .cart-item-img { width: 34px; height: 34px; image-rendering: pixelated; object-fit: contain; flex-shrink: 0; }
    .cart-item-name { font-weight: 700; font-size: 13px; color: #fff; flex: 1; }
    .cart-item-remove { background: none; border: none; color: #555; font-size: 18px; cursor: pointer; }
    .cart-item-remove:hover { color: #ef5350; }

    /* big number inputs */
    .cart-item-fields { display: flex; flex-direction: column; gap: 8px; }
    .cart-field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .cart-field { display: flex; flex-direction: column; gap: 3px; }
    .cart-field label { font-size: 11px; color: #888; }
    .cart-field input {
      background: #2e2e2e; border: 1px solid #444; color: #fff;
      padding: 7px 10px; border-radius: 5px; font-size: 14px;
      font-weight: 600; width: 100%;
    }
    .cart-field input:focus { outline: none; border-color: #4fc3f7; background: #333; }
    .cart-field input[readonly] { color: #666; cursor: default; background: #222; }
    .cart-field input.big {
      font-size: 16px; padding: 9px 12px; text-align: right;
    }

    .cart-item-result {
      border-top: 1px solid #333; padding-top: 8px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .result-row {
      display: flex; justify-content: space-between;
      font-size: 12px; color: #888;
    }
    .result-row b { color: #e0e0e0; }
    .result-row.profit b { font-size: 14px; }

    .cart-footer {
      padding: 14px 16px; border-top: 1px solid #333;
      display: flex; flex-direction: column; gap: 8px;
      position: sticky; bottom: 0; background: #1e1e1e;
    }
    .cart-total {
      font-size: 15px; font-weight: 700;
      display: flex; justify-content: space-between;
    }
    .btn-clear {
      background: #2d1010 !important; color: #ef9a9a !important;
      border: 1px solid #7f1d1d !important; width: 100%; padding: 8px !important;
      border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;
    }
    .btn-clear:hover { background: #3d1515 !important; }
  </style>
</head>
<body>

<header>
  <h1>SkyFlip</h1>
</header>

<div class="controls">
  <label>Margem mín. (%):</label>
  <input type="number" id="filter-margin" value="1" min="0" step="0.5" />

  <label>Vol. mín. /hora:</label>
  <input type="number" id="filter-volume" value="10" min="0" />

  <label>Lucro mín. (coins):</label>
  <input type="number" id="filter-profit" value="1000" min="0" step="500" style="width:130px" />

  <label>Ordenar por:</label>
  <select id="sort-key" style="width:150px">
    <option value="profit_hour">Lucro/hora</option>
    <option value="margin_pct">Margem %</option>
    <option value="margin_coins">Margem (coins)</option>
    <option value="volume">Vol. compra/h</option>
    <option value="risk_score">Menor risco</option>
  </select>

  <button id="btn-apply">Aplicar</button>
  <button id="btn-refresh" disabled>Atualizar</button>
  <button class="btn-cart-open" id="btn-cart">
    🛒 Carrinho
    <span class="cart-badge" id="cart-badge">0</span>
  </button>
</div>

<div class="status-bar">
  <div><span class="live-dot"></span><span id="live-label">Conectando...</span></div>
  <div id="count-info"></div>
  <div id="timer-info"></div>
</div>

<div id="error-box"></div>
<div id="loading">Buscando dados do Bazaar...</div>
<div id="empty-msg" style="display:none">Nenhum flip encontrado com esses filtros.</div>
<div class="cards-grid" id="cards"></div>

<!-- CART -->
<div class="modal-overlay" id="cart-modal">
  <div class="cart-panel">
    <div class="cart-header">
      <h2>🛒 Meus Flips</h2>
      <button class="cart-close" id="btn-cart-close">✕</button>
    </div>
    <div class="cart-body" id="cart-body"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Lucro total:</span>
        <span id="cart-total" class="pos">0 coins</span>
      </div>
      <button class="btn-clear" id="btn-clear-cart">🗑 Limpar tudo</button>
    </div>
  </div>
</div>

<script>
  const PROXY       = '/api/bazaar';
  const REFRESH_SEC = 60;
  const IMG         = 'https://sky.coflnet.com/static/icon/';

  let rawData = null, sortCol = 'profit_hour', sortAsc = false;
  let timerInterval = null, refreshTimeout = null, nextAt = 0;
  let cart = JSON.parse(localStorage.getItem('skyflip_cart') || '{}');

  // ---- format ----
  const fmt = n => {
    if (n == null || isNaN(n)) return '-';
    const a = Math.abs(n);
    if (a >= 1e9) return (n/1e9).toFixed(2)+'B';
    if (a >= 1e6) return (n/1e6).toFixed(2)+'M';
    if (a >= 1e3) return (n/1e3).toFixed(1)+'K';
    return n.toFixed(0);
  };
  const fmtFull = n => n == null || isNaN(n) ? '-' :
    n.toLocaleString('pt-BR', { maximumFractionDigits: 1 });
  const fmtCoins = n => n == null || isNaN(n) ? '-' :
    n.toLocaleString('pt-BR', { maximumFractionDigits: 0 }) + ' coins';
  const fmtPct   = n => isNaN(n) ? '-' : n.toFixed(2) + '%';

  // ---- API ----
  async function fetchData() {
    const res = await fetch(PROXY);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.cause || 'API error');
    return json;
  }

  // ---- Calc flips ----
  function calcFlips(data) {
    const TAX = 0.9875;
    return Object.entries(data.products).map(([id, p]) => {
      const qs = p.quick_status;
      if (!qs) return null;

      const buyPrice  = qs.sellPrice;   // o que você paga (instabuy)
      const sellPrice = qs.buyPrice;    // o que você recebe (instasell)
      if (!buyPrice || !sellPrice || buyPrice <= 0 || sellPrice <= 0) return null;

      const effectiveSell = sellPrice * TAX;
      const marginCoins   = effectiveSell - buyPrice;
      const marginPct     = (marginCoins / buyPrice) * 100;

      const buyVolH  = qs.buyMovingWeek  / 7 / 24;
      const sellVolH = qs.sellMovingWeek / 7 / 24;
      const buyVolD  = qs.buyMovingWeek  / 7;
      const sellVolD = qs.sellMovingWeek / 7;

      const profitHour = marginCoins * Math.min(buyVolH, sellVolH);

      // ---- Risk score (0=safe, 100=risky) ----
      // Fatores: spread alto = risco, volume baixo = risco, margem alta demais = manipulação
      const spreadRatio  = Math.abs(sellPrice - buyPrice) / buyPrice; // quanto maior, mais risco
      const volScore     = Math.min(buyVolH, sellVolH);                // volume mínimo
      const volRisk      = volScore < 5 ? 60 : volScore < 50 ? 30 : 10;
      const spreadRisk   = spreadRatio > 0.5 ? 60 : spreadRatio > 0.2 ? 30 : 10;
      const marginRisk   = marginPct > 100 ? 50 : marginPct > 30 ? 20 : 0; // margem absurda = manipulação
      const riskScore    = Math.min(100, Math.round((volRisk + spreadRisk + marginRisk) / 3));
      const riskLabel    = riskScore <= 30 ? 'Baixo' : riskScore <= 60 ? 'Médio' : 'Alto';
      const riskClass    = riskScore <= 30 ? 'risk-low' : riskScore <= 60 ? 'risk-med' : 'risk-high';

      return {
        id, name: id.replace(/_/g, ' '),
        buy_price: buyPrice, sell_price: sellPrice,
        effective_sell: effectiveSell,
        margin_coins: marginCoins, margin_pct: marginPct,
        buy_vol_h: buyVolH, sell_vol_h: sellVolH,
        buy_vol_d: buyVolD, sell_vol_d: sellVolD,
        supply: qs.sellVolume, demand: qs.buyVolume,
        instabuys: qs.buyMovingWeek, instasells: qs.sellMovingWeek,
        profit_hour: profitHour,
        risk_score: riskScore, risk_label: riskLabel, risk_class: riskClass,
      };
    }).filter(Boolean);
  }

  function process(flips) {
    const minPct    = parseFloat(document.getElementById('filter-margin').value) || 0;
    const minVol    = parseFloat(document.getElementById('filter-volume').value) || 0;
    const minProfit = parseFloat(document.getElementById('filter-profit').value) || 0;
    return flips
      .filter(f => f.margin_pct >= minPct && f.buy_vol_h >= minVol && f.profit_hour >= minProfit)
      .sort((a, b) => {
        const va = a[sortCol] ?? 0, vb = b[sortCol] ?? 0;
        // risk_score: menor = melhor, então inverte
        if (sortCol === 'risk_score') return sortAsc ? vb - va : va - vb;
        return sortAsc ? va - vb : vb - va;
      });
  }

  // ---- Render cards ----
  function render() {
    if (!rawData) return;
    const all    = calcFlips(rawData);
    const result = process(all);

    document.getElementById('count-info').textContent =
      `${result.length} flips de ${all.length} itens`;

    const grid = document.getElementById('cards');
    document.getElementById('empty-msg').style.display = result.length ? 'none' : 'block';
    if (!result.length) { grid.innerHTML = ''; return; }

    // max volumes para normalizar barras
    const maxVolH = Math.max(...result.map(f => Math.max(f.buy_vol_h, f.sell_vol_h)), 1);

    const mClass = p => p >= 5 ? 'pos' : p >= 2 ? 'warn' : 'neg';
    const pClass = v => v >= 0 ? 'pos' : 'neg';

    grid.innerHTML = result.map(f => {
      const inCart = !!cart[f.id];
      const buyBarW  = Math.round((f.buy_vol_h  / maxVolH) * 100);
      const sellBarW = Math.round((f.sell_vol_h / maxVolH) * 100);

      return `
      <div class="card${inCart ? ' in-cart' : ''}" data-id="${f.id}">
        <button class="card-add-btn" data-id="${f.id}" title="${inCart ? 'Ver no carrinho' : 'Adicionar ao carrinho'}">
          ${inCart ? '✓' : '+'}
        </button>

        <img class="card-img"
          src="${IMG}${encodeURIComponent(f.id)}/vanilla" alt="${f.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="card-img-placeholder">📦</div>

        <div class="card-name">${f.name}</div>

        <span class="risk-badge ${f.risk_class}">
          ${f.risk_score <= 30 ? '🛡' : f.risk_score <= 60 ? '⚠️' : '🔴'} Risco ${f.risk_label}
        </span>

        <div class="card-divider"></div>

        <div class="card-row"><span>Comprar por:</span><span>${fmtFull(f.buy_price)}</span></div>
        <div class="card-row"><span>Vender por:</span><span>${fmtFull(f.sell_price)}</span></div>
        <div class="card-row">
          <span>Margem:</span>
          <span class="${mClass(f.margin_pct)}">${fmtPct(f.margin_pct)} (${fmt(f.margin_coins)} c)</span>
        </div>

        <div class="card-divider"></div>

        <div class="vol-bars">
          <div class="vol-bar-row">
            <span style="width:44px">Compra</span>
            <div class="vol-bar-track">
              <div class="vol-bar-fill" style="width:${buyBarW}%;background:#4fc3f7"></div>
            </div>
            <span class="vol-bar-val">${fmt(f.buy_vol_h)}/h</span>
          </div>
          <div class="vol-bar-row">
            <span style="width:44px">Venda</span>
            <div class="vol-bar-track">
              <div class="vol-bar-fill" style="width:${sellBarW}%;background:#66bb6a"></div>
            </div>
            <span class="vol-bar-val">${fmt(f.sell_vol_h)}/h</span>
          </div>
        </div>
        <div class="card-row neu" style="font-size:11px">
          <span>${fmt(f.buy_vol_d)}/dia compra</span>
          <span>${fmt(f.sell_vol_d)}/dia venda</span>
        </div>

        <div class="card-divider"></div>
        <div class="card-profit ${pClass(f.profit_hour)}">
          Lucro/h: ${fmt(f.profit_hour)} coins
        </div>
      </div>`;
    }).join('');

    grid.querySelectorAll('.card-add-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id   = btn.dataset.id;
        const flip = calcFlips(rawData).find(f => f.id === id);
        if (!flip) return;
        cart[id] ? openCart() : addToCart(flip);
      });
    });
  }

  // ---- Cart ----
  const saveCart = () => localStorage.setItem('skyflip_cart', JSON.stringify(cart));

  function addToCart(flip) {
    cart[flip.id] = {
      id: flip.id, name: flip.name,
      buy_price: flip.buy_price, sell_price: flip.sell_price,
      qty: 1, boughtAt: parseFloat(flip.buy_price.toFixed(1)), soldAt: '',
    };
    saveCart(); updateCartBadge(); renderCart();
    const card = document.querySelector(`.card[data-id="${flip.id}"]`);
    if (card) {
      card.classList.add('in-cart');
      const btn = card.querySelector('.card-add-btn');
      btn.textContent = '✓'; btn.title = 'Ver no carrinho';
    }
    openCart();
  }

  function removeFromCart(id) {
    delete cart[id]; saveCart(); updateCartBadge(); renderCart();
    const card = document.querySelector(`.card[data-id="${id}"]`);
    if (card) {
      card.classList.remove('in-cart');
      const btn = card.querySelector('.card-add-btn');
      btn.textContent = '+'; btn.title = 'Adicionar ao carrinho';
    }
  }

  function updateCartBadge() {
    const n = Object.keys(cart).length;
    const b = document.getElementById('cart-badge');
    b.textContent = n; b.style.display = n > 0 ? 'block' : 'none';
  }

  function calcResult(e) {
    const qty = parseFloat(e.qty) || 0;
    const bought = parseFloat(e.boughtAt) || 0;
    const sold   = parseFloat(e.soldAt)   || 0;
    const spent    = bought * qty;
    const received = sold * 0.9875 * qty;
    const profit   = received - spent;
    return { spent, received, profit };
  }

  function renderCart() {
    const body    = document.getElementById('cart-body');
    const totEl   = document.getElementById('cart-total');
    const entries = Object.values(cart);

    if (!entries.length) {
      body.innerHTML = '<div class="cart-empty">Nenhum flip salvo ainda.<br>Clique no <b>+</b> em um item para adicionar.</div>';
      totEl.textContent = '0 coins'; totEl.className = '';
      return;
    }

    let totalProfit = 0;

    body.innerHTML = entries.map(e => {
      const res = calcResult(e);
      totalProfit += isNaN(res.profit) ? 0 : res.profit;
      const hasSold = e.soldAt !== '' && parseFloat(e.soldAt) > 0;
      const pc = res.profit >= 0 ? 'pos' : 'neg';

      return `
      <div class="cart-item" data-id="${e.id}">
        <div class="cart-item-header">
          <img class="cart-item-img"
            src="${IMG}${encodeURIComponent(e.id)}/vanilla"
            alt="${e.name}" onerror="this.style.display='none'" />
          <div class="cart-item-name">${e.name}</div>
          <button class="cart-item-remove" data-id="${e.id}">✕</button>
        </div>

        <div class="cart-item-fields">
          <div class="cart-field-group">
            <div class="cart-field">
              <label>Quantidade</label>
              <input type="number" class="big" min="1" step="1"
                value="${e.qty}" data-id="${e.id}" data-field="qty" />
            </div>
            <div class="cart-field">
              <label>Preço atual</label>
              <input type="number" class="big" value="${e.buy_price.toFixed(1)}" readonly />
            </div>
          </div>
          <div class="cart-field">
            <label>💰 Preço que COMPROU</label>
            <input type="number" class="big" min="0" step="1"
              value="${e.boughtAt}" data-id="${e.id}" data-field="boughtAt"
              placeholder="0" />
          </div>
          <div class="cart-field">
            <label>💵 Preço que VENDEU</label>
            <input type="number" class="big" min="0" step="1"
              value="${e.soldAt}" data-id="${e.id}" data-field="soldAt"
              placeholder="Preencha ao vender..." />
          </div>
        </div>

        ${hasSold ? `
        <div class="cart-item-result">
          <div class="result-row"><span>Gasto total:</span><b>${fmtCoins(res.spent)}</b></div>
          <div class="result-row"><span>Recebido (c/ tax 1.25%):</span><b>${fmtCoins(res.received)}</b></div>
          <div class="result-row profit"><span>Lucro:</span><b class="${pc}">${fmtCoins(res.profit)}</b></div>
        </div>` : ''}
      </div>`;
    }).join('');

    body.querySelectorAll('.cart-item-remove').forEach(btn =>
      btn.addEventListener('click', () => removeFromCart(btn.dataset.id))
    );

    body.querySelectorAll('input[data-field]').forEach(input => {
      input.addEventListener('change', () => {
        cart[input.dataset.id][input.dataset.field] = input.value;
        saveCart(); renderCart();
      });
      // não re-render no input para não perder o foco, só salva
      input.addEventListener('input', () => {
        cart[input.dataset.id][input.dataset.field] = input.value;
        saveCart();
      });
    });

    totEl.textContent = fmtCoins(totalProfit);
    totEl.className   = totalProfit >= 0 ? 'pos' : 'neg';
  }

  const openCart  = () => { document.getElementById('cart-modal').classList.add('open'); renderCart(); };
  const closeCart = () => document.getElementById('cart-modal').classList.remove('open');

  // ---- Load ----
  async function load() {
    hideError();
    document.getElementById('btn-refresh').disabled = true;
    document.getElementById('live-label').textContent = 'Atualizando...';
    try {
      rawData = await fetchData();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('live-label').textContent =
        'Live • atualizado ' + new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      render();
      scheduleRefresh();
    } catch (e) {
      showError('Erro: ' + e.message);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('live-label').textContent = 'Erro na atualização';
    } finally {
      document.getElementById('btn-refresh').disabled = false;
    }
  }

  function scheduleRefresh() {
    if (refreshTimeout) clearTimeout(refreshTimeout);
    if (timerInterval)  clearInterval(timerInterval);
    nextAt = Date.now() + REFRESH_SEC * 1000;
    timerInterval = setInterval(() => {
      const s = Math.max(0, Math.round((nextAt - Date.now()) / 1000));
      document.getElementById('timer-info').textContent = `Próx. atualização em ${s}s`;
    }, 1000);
    refreshTimeout = setTimeout(() => { clearInterval(timerInterval); load(); }, REFRESH_SEC * 1000);
  }

  const hideError = () => { document.getElementById('error-box').style.display = 'none'; };
  function showError(msg) {
    const b = document.getElementById('error-box');
    b.textContent = msg; b.style.display = 'block';
  }

  // ---- Events ----
  document.getElementById('btn-apply').addEventListener('click', render);
  document.getElementById('btn-refresh').addEventListener('click', load);
  document.getElementById('btn-cart').addEventListener('click', openCart);
  document.getElementById('btn-cart-close').addEventListener('click', closeCart);
  document.getElementById('cart-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('cart-modal')) closeCart();
  });
  document.getElementById('btn-clear-cart').addEventListener('click', () => {
    if (!confirm('Limpar todos os flips salvos?')) return;
    cart = {}; saveCart(); updateCartBadge(); renderCart(); render();
  });
  document.getElementById('sort-key').addEventListener('change', e => {
    sortCol = e.target.value; sortAsc = false; render();
  });

  updateCartBadge();
  load();
</script>
</body>
</html>
