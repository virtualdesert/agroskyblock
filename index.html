<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyFlip - Bazaar Flipper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    header {
      background: #111;
      padding: 12px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    header h1 { font-size: 20px; color: #4fc3f7; }

    .controls {
      background: #222;
      padding: 10px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .controls label { color: #aaa; font-size: 13px; }

    .controls input, .controls select {
      background: #333;
      border: 1px solid #444;
      color: #fff;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 13px;
      width: 110px;
    }

    .controls button {
      background: #4fc3f7;
      color: #111;
      border: none;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
    }

    .controls button:hover { background: #81d4fa; }
    .controls button:disabled { background: #444; color: #777; cursor: not-allowed; }

    .status-bar {
      padding: 5px 20px;
      background: #1e1e1e;
      font-size: 12px;
      color: #666;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      gap: 24px;
    }

    #error-box {
      background: #2d1010;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      padding: 10px 20px;
      margin: 12px 20px 0;
      border-radius: 4px;
      display: none;
    }

    #loading {
      text-align: center;
      padding: 60px;
      color: #555;
    }

    /* CARDS GRID */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      padding: 16px 20px;
    }

    .card {
      background: #252525;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s;
    }

    .card:hover { border-color: #4fc3f7; }

    .card-img {
      width: 56px;
      height: 56px;
      image-rendering: pixelated;
      object-fit: contain;
    }

    .card-img-placeholder {
      width: 56px;
      height: 56px;
      background: #333;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .card-name {
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      text-align: center;
      line-height: 1.3;
    }

    .card-divider {
      width: 100%;
      height: 1px;
      background: #333;
      margin: 4px 0;
    }

    .card-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #aaa;
    }

    .card-row span:last-child { color: #e0e0e0; font-weight: 500; }

    .card-profit {
      margin-top: 6px;
      font-size: 13px;
      font-weight: 700;
    }

    .pos { color: #66bb6a; }
    .neg { color: #ef5350; }
    .warn { color: #ffa726; }

    #empty-msg {
      text-align: center;
      padding: 50px;
      color: #444;
    }
  </style>
</head>
<body>

<header>
  <h1>SkyFlip</h1>
</header>

<div class="controls">
  <label>Margem mín. (%):</label>
  <input type="number" id="filter-margin" value="1" min="0" step="0.5" />

  <label>Vol. mín. /hora:</label>
  <input type="number" id="filter-volume" value="10" min="0" />

  <label>Lucro mín. (coins):</label>
  <input type="number" id="filter-profit" value="1000" min="0" step="500" style="width:130px" />

  <label>Ordenar por:</label>
  <select id="sort-key" style="width:140px">
    <option value="profit_hour">Lucro/hora</option>
    <option value="margin_pct">Margem %</option>
    <option value="margin_coins">Margem (coins)</option>
    <option value="volume">Vol. compra/h</option>
    <option value="buy_price">Preço compra</option>
  </select>

  <button id="btn-apply">Aplicar</button>
  <button id="btn-refresh" disabled>Atualizar agora</button>
</div>

<div class="status-bar">
  <div id="count-info">Carregando...</div>
  <div id="timer-info"></div>
</div>

<div id="error-box"></div>
<div id="loading">Buscando dados do Bazaar...</div>
<div id="empty-msg" style="display:none">Nenhum flip encontrado com esses filtros.</div>
<div class="cards-grid" id="cards"></div>

<script>
  const PROXY = '/api/bazaar';
  const REFRESH_SEC = 60;
  // Imagens dos itens via sky.shiiyu.moe (API pública de ícones do Skyblock)
  const IMG_BASE = 'https://sky.shiiyu.moe/item/';

  let rawData = null;
  let sortCol = 'profit_hour';
  let sortAsc  = false;
  let timerInterval = null;
  let refreshTimeout = null;
  let nextAt = 0;

  function fmt(n) {
    if (n == null || isNaN(n)) return '-';
    const a = Math.abs(n);
    if (a >= 1e9) return (n / 1e9).toFixed(2) + 'B';
    if (a >= 1e6) return (n / 1e6).toFixed(2) + 'M';
    if (a >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toFixed(0);
  }

  function fmtFull(n) {
    if (n == null || isNaN(n)) return '-';
    return n.toLocaleString('pt-BR', { maximumFractionDigits: 1 });
  }

  function fmtPct(n) {
    return isNaN(n) ? '-' : n.toFixed(2) + '%';
  }

  async function fetchData() {
    const res = await fetch(PROXY);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.cause || 'API error');
    return json;
  }

  function calcFlips(data) {
    const TAX = 0.9875;
    const flips = [];

    for (const [id, p] of Object.entries(data.products)) {
      const qs = p.quick_status;
      if (!qs) continue;

      const instaBuyPrice  = qs.sellPrice;
      const instaSellPrice = qs.buyPrice;
      if (!instaBuyPrice || !instaSellPrice || instaBuyPrice <= 0 || instaSellPrice <= 0) continue;

      const effectiveSell = instaSellPrice * TAX;
      const marginCoins   = effectiveSell - instaBuyPrice;
      const marginPct     = (marginCoins / instaBuyPrice) * 100;

      const buyVol  = qs.buyMovingWeek  / 7 / 24;
      const sellVol = qs.sellMovingWeek / 7 / 24;
      const profitHour = marginCoins * Math.min(buyVol, sellVol);

      flips.push({
        id,
        name: id.replace(/_/g, ' '),
        buy_price:    instaBuyPrice,
        sell_price:   instaSellPrice,
        margin_coins: marginCoins,
        margin_pct:   marginPct,
        volume:       buyVol,
        sell_volume:  sellVol,
        instabuys:    qs.buyMovingWeek,
        instasells:   qs.sellMovingWeek,
        supply:       qs.sellVolume,
        demand:       qs.buyVolume,
        profit_hour:  profitHour,
      });
    }
    return flips;
  }

  function process(flips) {
    const minPct    = parseFloat(document.getElementById('filter-margin').value) || 0;
    const minVol    = parseFloat(document.getElementById('filter-volume').value) || 0;
    const minProfit = parseFloat(document.getElementById('filter-profit').value) || 0;

    return flips
      .filter(f => f.margin_pct >= minPct && f.volume >= minVol && f.profit_hour >= minProfit)
      .sort((a, b) => {
        const va = a[sortCol] ?? 0;
        const vb = b[sortCol] ?? 0;
        return sortAsc ? va - vb : vb - va;
      });
  }

  function render() {
    if (!rawData) return;
    const all    = calcFlips(rawData);
    const result = process(all);

    document.getElementById('count-info').textContent =
      `Mostrando ${result.length} flips de ${all.length} itens`;

    const grid     = document.getElementById('cards');
    const emptyMsg = document.getElementById('empty-msg');

    if (result.length === 0) {
      grid.innerHTML     = '';
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';

    const mClass = (pct) => pct >= 5 ? 'pos' : pct >= 2 ? 'warn' : 'neg';
    const pClass = (v)   => v >= 0 ? 'pos' : 'neg';

    grid.innerHTML = result.map(f => `
      <div class="card">
        <img
          class="card-img"
          src="${IMG_BASE}${encodeURIComponent(f.id)}"
          alt="${f.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
        />
        <div class="card-img-placeholder" style="display:none">🧪</div>

        <div class="card-name">${f.name}</div>
        <div class="card-divider"></div>

        <div class="card-row"><span>Buy Price:</span><span>${fmtFull(f.buy_price)} coins</span></div>
        <div class="card-row"><span>Sell Price:</span><span>${fmtFull(f.sell_price)} coins</span></div>
        <div class="card-row"><span>Supply:</span><span>${fmtFull(f.supply)}</span></div>
        <div class="card-row"><span>Demand:</span><span>${fmtFull(f.demand)}</span></div>
        <div class="card-row"><span>Instabuys:</span><span>${fmtFull(f.instabuys)}</span></div>
        <div class="card-row"><span>Instasells:</span><span>${fmtFull(f.instasells)}</span></div>

        <div class="card-divider"></div>
        <div class="card-row">
          <span>Margem:</span>
          <span class="${mClass(f.margin_pct)}">${fmtPct(f.margin_pct)}</span>
        </div>
        <div class="card-profit ${pClass(f.profit_hour)}">
          Lucro/h: ${fmt(f.profit_hour)} coins
        </div>
      </div>
    `).join('');
  }

  async function load() {
    hideError();
    document.getElementById('btn-refresh').disabled = true;
    try {
      rawData = await fetchData();
      document.getElementById('loading').style.display = 'none';
      render();
      scheduleRefresh();
    } catch (e) {
      showError('Erro: ' + e.message);
      document.getElementById('loading').style.display = 'none';
    } finally {
      document.getElementById('btn-refresh').disabled = false;
    }
  }

  function scheduleRefresh() {
    if (refreshTimeout) clearTimeout(refreshTimeout);
    if (timerInterval)  clearInterval(timerInterval);
    nextAt = Date.now() + REFRESH_SEC * 1000;
    timerInterval = setInterval(() => {
      const s = Math.max(0, Math.round((nextAt - Date.now()) / 1000));
      document.getElementById('timer-info').textContent = `Próxima atualização em ${s}s`;
    }, 1000);
    refreshTimeout = setTimeout(() => {
      clearInterval(timerInterval);
      load();
    }, REFRESH_SEC * 1000);
  }

  function hideError() {
    document.getElementById('error-box').style.display = 'none';
  }

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.style.display = 'block';
    console.error('[SkyFlip]', msg);
  }

  document.getElementById('btn-apply').addEventListener('click', render);
  document.getElementById('btn-refresh').addEventListener('click', load);
  document.getElementById('sort-key').addEventListener('change', e => {
    sortCol = e.target.value;
    sortAsc = false;
    render();
  });

  load();
</script>
</body>
</html>
